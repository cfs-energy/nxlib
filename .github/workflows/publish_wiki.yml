name: publish wiki docs

on:
  push:
    branches:
      - "main"
    paths:
      - "src/nxlib/**"
      - "scripts/generate_md_docs.py"
  workflow_dispatch:
  pull_request:

permissions:
  contents: write

jobs:
  publish-wiki:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@e92bafb6253dcd438e0484186d7669ea7a8ca1cc # v6

      - name: Install nxlib and dev dependencies
        run: uv sync --dev

      - name: Generate Markdown docs
        run: uv run python scripts/generate_md_docs.py docs_md

      - name: Publish to wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.wiki.git" wiki_repo

          find wiki_repo -mindepth 1 ! -path 'wiki_repo/.git' ! -path 'wiki_repo/.git/*' -delete

          # Copy with flat names (wiki doesn't support path links), rewrite ](a/b/c) -> ](a-b-c)
          : > wiki_repo/.pages
          find docs_md -name '*.md' | sort | while read -r f; do
            flat="${f#docs_md/}"; flat="${flat//\//-}"
            cp "$f" "wiki_repo/$flat"
            perl -i -pe 's/\]\(([^)]+)\)/"](" . ($1 =~ s|\/|-|gr) . ")"/ge' "wiki_repo/$flat"
            echo "${flat%.md}" >> wiki_repo/.pages
          done

          [ -f wiki_repo/nxlib.md ] && cp wiki_repo/nxlib.md wiki_repo/Home.md
          {
            echo "### nxlib docs"
            echo ""
            echo "- [Home](Home)"
            sed 's/^\(.*\)$/- [\1](\1)/' wiki_repo/.pages
          } > wiki_repo/_Sidebar.md
          rm -f wiki_repo/.pages

          cd wiki_repo
          git add -A
          git diff --cached --quiet || { git commit -m "Update wiki docs from ${GITHUB_SHA::8}"; git push; }
