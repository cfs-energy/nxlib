name: nxlib python tests

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

jobs:
  nxlib-python-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@e92bafb6253dcd438e0484186d7669ea7a8ca1cc # v6

      - name: Install nxlib and dev dependencies
        run: uv sync --dev

      - name: detailed nxlib status
        run: uv run nxlib status -v

      - name: pytest
        run: uv run pytest -ra
